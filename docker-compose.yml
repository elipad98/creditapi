services:
  db:
    image: postgres:17-alpine
    container_name: credit_db
    environment:
      POSTGRES_USER: credituser
      POSTGRES_PASSWORD: creditpass
      POSTGRES_DB: creditdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credituser -d creditdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: credit_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://credituser:creditpass@db:5432/creditdb
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
